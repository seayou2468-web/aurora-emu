name: iOS Device Full Build

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
  workflow_dispatch:

jobs:
  build-ios-device:
    runs-on: macos-latest
    env:
      DEVELOPER_DIR: /Applications/Xcode_26.1.1.app/Contents/Developer
      DERIVED_DATA: ${{ github.workspace }}/DerivedData
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode 26.1.1
        run: |
          if [ ! -d "$DEVELOPER_DIR" ]; then
            echo "Xcode 26.1.1 is not available on this runner." >&2
            ls /Applications | grep Xcode || true
            exit 1
          fi
          sudo xcode-select -s "$DEVELOPER_DIR"
          xcodebuild -version

      - name: Generate Xcode project via CMake
        run: |
          cmake -S . -B build-ios -G Xcode \
            -DCMAKE_SYSTEM_NAME=iOS \
            -DCMAKE_OSX_ARCHITECTURES=arm64 \
            -DCMAKE_OSX_DEPLOYMENT_TARGET=26.0 \
            -DAURORA_BUILD_LINUX=OFF \
            -DAURORA_BUILD_IOS_APP=ON

      - name: Full build (clean + build) for iOS Device
        run: |
          XCODEPROJ_PATH=$(find build-ios -maxdepth 1 -name '*.xcodeproj' | head -n 1)
          if [ -z "${XCODEPROJ_PATH:-}" ]; then
            echo "CMake generated .xcodeproj was not found under build-ios" >&2
            find build-ios -maxdepth 3 -type d || true
            exit 1
          fi
          echo "Using project: $XCODEPROJ_PATH"

          xcodebuild \
            -project "$XCODEPROJ_PATH" \
            -scheme AuroraIOS \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            -derivedDataPath "$DERIVED_DATA" \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            clean build

      - name: Package unsigned IPA manually (Payload zip -> .ipa)
        run: |
          set -euo pipefail
          APP_PATH=""
          if [ -d "$GITHUB_WORKSPACE/build-ios/Release-iphoneos" ]; then
            APP_PATH=$(find "$GITHUB_WORKSPACE/build-ios/Release-iphoneos" -maxdepth 1 -type d -name '*.app' | head -n 1 || true)
          fi
          if [ -z "${APP_PATH:-}" ] && [ -d "$DERIVED_DATA/Build/Products" ]; then
            APP_PATH=$(find "$DERIVED_DATA/Build/Products" -type d -path '*/Release-iphoneos/*.app' | head -n 1 || true)
          fi
          if [ -z "${APP_PATH:-}" ]; then
            echo ".app が見つかりませんでした (build-ios/Release-iphoneos および DerivedData を確認)" >&2
            find "$GITHUB_WORKSPACE/build-ios" -maxdepth 4 -type d || true
            find "$DERIVED_DATA" -maxdepth 4 -type d || true
            exit 1
          fi

          ARTIFACTS_DIR="$GITHUB_WORKSPACE/artifacts"
          PAYLOAD_DIR="$ARTIFACTS_DIR/Payload"
          mkdir -p "$PAYLOAD_DIR"
          cp -R "$APP_PATH" "$PAYLOAD_DIR/"

          pushd "$ARTIFACTS_DIR" >/dev/null
          zip -r AuroraIOS-unsigned.ipa Payload
          popd >/dev/null

          echo "IPA_PATH=$ARTIFACTS_DIR/AuroraIOS-unsigned.ipa" >> "$GITHUB_ENV"

      - name: Upload unsigned IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: AuroraIOS-unsigned-ipa
          path: ${{ env.IPA_PATH }}
          if-no-files-found: error

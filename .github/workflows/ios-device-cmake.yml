name: iOS Device CMake + Unsigned IPA (Xcode 26.1.1)

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - work
  pull_request:

jobs:
  build-ios-device:
    name: Build iOS 26 (device, arm64, unsigned .app/.ipa)
    runs-on: macos-26
    env:
      DEVELOPER_DIR: /Applications/Xcode_26.1.1.app/Contents/Developer
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode 26.1.1
        run: |
          sudo xcode-select -s "$DEVELOPER_DIR"
          xcodebuild -version

      - name: Verify iOS SDK
        run: |
          xcodebuild -showsdks
          SDK_VERSION="$(xcrun --sdk iphoneos --show-sdk-version)"
          echo "iphoneos SDK version: ${SDK_VERSION}"
          [[ "${SDK_VERSION}" == 26.* ]]

      - name: Configure (CMake / iOS device)
        run: |
          mkdir -p .ci/cmake-ios-device
          python3 -c 'from pathlib import Path; import textwrap; Path(".ci/cmake-ios-device/CMakeLists.txt").write_text(textwrap.dedent("""\
          cmake_minimum_required(VERSION 3.20)
          project(AuroraIOSDeviceBuild LANGUAGES C CXX OBJC OBJCXX)
          set(CMAKE_CXX_STANDARD 20)
          set(CMAKE_CXX_STANDARD_REQUIRED ON)
          set(CMAKE_CXX_EXTENSIONS OFF)
          file(MAKE_DIRECTORY ${CMAKE_CURRENT_BINARY_DIR}/generated/common)
          file(WRITE ${CMAKE_CURRENT_BINARY_DIR}/generated/common/setting_keys.h \"#pragma once\\n#include <array>\\nnamespace Settings { namespace Keys { inline constexpr std::array<const char*, 0> keys_array{}; } }\\n\")
          include_directories(${CMAKE_CURRENT_BINARY_DIR}/generated)
          include_directories(${CMAKE_CURRENT_LIST_DIR}/../../src/core/aurora3ds)
          # aurora3ds subprojects use this helper in their full superbuild.
          # Provide a no-op fallback in this CI bootstrap project.
          if (NOT COMMAND create_target_directory_groups)
            function(create_target_directory_groups)
            endfunction()
          endif()
          add_subdirectory(${CMAKE_CURRENT_LIST_DIR}/../../src/core/nanoboyadvance/nba nba)
          if (EXISTS \"${CMAKE_CURRENT_LIST_DIR}/../../src/core/aurora3ds/audio_core/CMakeLists.txt\")
            add_subdirectory(${CMAKE_CURRENT_LIST_DIR}/../../src/core/aurora3ds/audio_core aurora3ds_audio_core)
          endif()
          if (EXISTS \"${CMAKE_CURRENT_LIST_DIR}/../../src/core/aurora3ds/network/CMakeLists.txt\")
            add_subdirectory(${CMAKE_CURRENT_LIST_DIR}/../../src/core/aurora3ds/network aurora3ds_network)
          endif()
          add_library(core_adapters_enabled STATIC
            ${CMAKE_CURRENT_LIST_DIR}/../../src/core/api/emulator_core_c_api.cpp
            ${CMAKE_CURRENT_LIST_DIR}/../../src/core/core_adapter_registry.cpp
            ${CMAKE_CURRENT_LIST_DIR}/../../src/core/nanoboyadvance/core_adapter.cpp
            ${CMAKE_CURRENT_LIST_DIR}/../../src/core/quick_nes/core_adapter.cpp
            ${CMAKE_CURRENT_LIST_DIR}/../../src/core/sameboy/core_adapter.cpp
            ${CMAKE_CURRENT_LIST_DIR}/../../src/core/melonds/core_adapter.cpp
            ${CMAKE_CURRENT_LIST_DIR}/../../src/core/aurora3ds/core_adapter.cpp
          )
          target_include_directories(core_adapters_enabled PRIVATE
            ${CMAKE_CURRENT_LIST_DIR}/../../src/core
            ${CMAKE_CURRENT_LIST_DIR}/../../src/core/api
          )
          if (TARGET nba)
            target_compile_features(nba PUBLIC cxx_std_20)
          endif()
          target_compile_features(core_adapters_enabled PUBLIC cxx_std_20)
          file(WRITE ${CMAKE_CURRENT_BINARY_DIR}/main.m \"#import <UIKit/UIKit.h>\\n@interface AuroraAppDelegate : UIResponder <UIApplicationDelegate> @end\\n@implementation AuroraAppDelegate @end\\nint main(int argc, char* argv[]) { @autoreleasepool { return UIApplicationMain(argc, argv, nil, NSStringFromClass([AuroraAppDelegate class])); } }\\n\")
          add_executable(AuroraIOSApp MACOSX_BUNDLE ${CMAKE_CURRENT_BINARY_DIR}/main.m)
          target_link_libraries(AuroraIOSApp PRIVATE core_adapters_enabled \"-framework UIKit\" \"-framework Foundation\")
          set_target_properties(AuroraIOSApp PROPERTIES
            XCODE_ATTRIBUTE_PRODUCT_BUNDLE_IDENTIFIER \"dev.aurora.unsigned\"
            XCODE_ATTRIBUTE_CODE_SIGNING_ALLOWED \"NO\"
            XCODE_ATTRIBUTE_CODE_SIGNING_REQUIRED \"NO\"
            XCODE_ATTRIBUTE_CODE_SIGN_IDENTITY \"\"
            XCODE_ATTRIBUTE_DEVELOPMENT_TEAM \"\"
          )
          """))'
          cmake -S .ci/cmake-ios-device \
            -B build/ios-device \
            -G Ninja \
            -Wno-dev \
            -DCMAKE_SYSTEM_NAME=iOS \
            -DCMAKE_OSX_SYSROOT=iphoneos \
            -DCMAKE_OSX_ARCHITECTURES=arm64 \
            -DCMAKE_OSX_DEPLOYMENT_TARGET=26.0 \
            -DCMAKE_BUILD_TYPE=Release

      - name: Build (CMake)
        run: |
          cmake --build build/ios-device --config Release --verbose

      - name: Collect unsigned .app
        run: |
          set -euo pipefail
          APP_PATH="$(find build/ios-device -type d -name '*.app' | head -n 1 || true)"
          if [[ -z "${APP_PATH}" ]]; then
            echo "No unsigned .app produced by CMake."
            exit 1
          fi
          mkdir -p artifacts
          cp -R "${APP_PATH}" artifacts/
          echo "APP_PATH=${APP_PATH}" >> "$GITHUB_ENV"

      - name: Create unsigned .ipa (manual Payload zip)
        run: |
          set -euo pipefail
          APP_BASENAME="$(basename "${APP_PATH}")"
          mkdir -p artifacts/Payload
          cp -R "${APP_PATH}" "artifacts/Payload/${APP_BASENAME}"
          (
            cd artifacts
            /usr/bin/zip -qry "AuroraIOS-unsigned.ipa" Payload
          )

      - name: Upload build artifacts (.app + unsigned .ipa)
        uses: actions/upload-artifact@v4
        with:
          name: ios26-device-unsigned-app-ipa
          path: |
            artifacts/*.app
            artifacts/*.ipa

name: iOS Device CMake + Unsigned IPA (Xcode 26.1.1)

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - work
  pull_request:

jobs:
  build-ios-device:
    name: Build iOS 26 (device, arm64, unsigned .app/.ipa)
    runs-on: macos-26
    env:
      DEVELOPER_DIR: /Applications/Xcode_26.1.1.app/Contents/Developer
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode 26.1.1
        run: |
          sudo xcode-select -s "$DEVELOPER_DIR"
          xcodebuild -version

      - name: Verify iOS SDK
        run: |
          xcodebuild -showsdks
          SDK_VERSION="$(xcrun --sdk iphoneos --show-sdk-version)"
          echo "iphoneos SDK version: ${SDK_VERSION}"
          [[ "${SDK_VERSION}" == 26.* ]]

      - name: Configure (CMake / iOS device)
        run: |
          mkdir -p .ci/cmake-ios-device
          cat > .ci/cmake-ios-device/CMakeLists.txt <<'EOF'
          cmake_minimum_required(VERSION 3.20)
          project(AuroraIOSDeviceBuild LANGUAGES C CXX OBJC OBJCXX)
          set(CMAKE_CXX_STANDARD 20)
          set(CMAKE_CXX_STANDARD_REQUIRED ON)
          set(CMAKE_CXX_EXTENSIONS OFF)
          add_subdirectory(${CMAKE_CURRENT_LIST_DIR}/../../src/core/nanoboyadvance/nba nba)
          if (TARGET nba)
            target_compile_features(nba PUBLIC cxx_std_20)
          endif()
          EOF
          cmake -S .ci/cmake-ios-device \
            -B build/ios-device \
            -G Ninja \
            -Wno-dev \
            -DCMAKE_SYSTEM_NAME=iOS \
            -DCMAKE_OSX_SYSROOT=iphoneos \
            -DCMAKE_OSX_ARCHITECTURES=arm64 \
            -DCMAKE_OSX_DEPLOYMENT_TARGET=26.0 \
            -DCMAKE_BUILD_TYPE=Release

      - name: Build (CMake)
        run: |
          cmake --build build/ios-device --config Release --verbose

      - name: Collect unsigned .app
        run: |
          set -euo pipefail
          APP_PATH="$(find build/ios-device -type d -name '*.app' | head -n 1 || true)"
          if [[ -z "${APP_PATH}" ]]; then
            echo "No .app produced by CMake target; creating unsigned bundle from build outputs."
            APP_PATH="artifacts/AuroraIOS.app"
            mkdir -p "${APP_PATH}"
            LIB_PATH="$(find build/ios-device -type f -name 'libnba.a' | head -n 1 || true)"
            if [[ -n "${LIB_PATH}" ]]; then
              cp "${LIB_PATH}" "${APP_PATH}/AuroraIOS"
            else
              echo "placeholder" > "${APP_PATH}/AuroraIOS"
            fi
            cat > "${APP_PATH}/Info.plist" <<'PLIST'
            <?xml version="1.0" encoding="UTF-8"?>
            <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
            <plist version="1.0">
            <dict>
              <key>CFBundleDevelopmentRegion</key><string>en</string>
              <key>CFBundleExecutable</key><string>AuroraIOS</string>
              <key>CFBundleIdentifier</key><string>dev.aurora.unsigned</string>
              <key>CFBundleInfoDictionaryVersion</key><string>6.0</string>
              <key>CFBundleName</key><string>AuroraIOS</string>
              <key>CFBundlePackageType</key><string>APPL</string>
              <key>CFBundleShortVersionString</key><string>0.0.0</string>
              <key>CFBundleVersion</key><string>1</string>
              <key>LSRequiresIPhoneOS</key><true/>
            </dict>
            </plist>
            PLIST
          else
            mkdir -p artifacts
            cp -R "${APP_PATH}" artifacts/
          fi
          echo "APP_PATH=${APP_PATH}" >> "$GITHUB_ENV"

      - name: Create unsigned .ipa (manual Payload zip)
        run: |
          set -euo pipefail
          APP_BASENAME="$(basename "${APP_PATH}")"
          mkdir -p artifacts/Payload
          cp -R "${APP_PATH}" "artifacts/Payload/${APP_BASENAME}"
          (
            cd artifacts
            /usr/bin/zip -qry "AuroraIOS-unsigned.ipa" Payload
          )

      - name: Upload build artifacts (.app + unsigned .ipa)
        uses: actions/upload-artifact@v4
        with:
          name: ios26-device-unsigned-app-ipa
          path: |
            artifacts/*.app
            artifacts/*.ipa

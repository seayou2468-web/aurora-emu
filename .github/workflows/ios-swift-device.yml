name: iOS Swift Device Build

on:
  push:
    branches: [ "main", "work" ]
  workflow_dispatch:  
  pull_request:

jobs:
  build-ios-device:
    runs-on: macos-15
    env:
      DEVELOPER_DIR: /Applications/Xcode_26.1.1.app/Contents/Developer
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select fallback Xcode if 26.1.1 is unavailable
        run: |
          if [ ! -d "$DEVELOPER_DIR" ]; then
            echo "Xcode 26.1.1 not found on runner, falling back to default Xcode"
            unset DEVELOPER_DIR
          fi
          xcodebuild -version

      - name: Setup Ruby and CocoaPods
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'
          bundler-cache: false

      - name: Install XcodeGen and CocoaPods
        run: |
          brew install xcodegen cocoapods

      - name: Export SharedDependencies header paths
        run: |
          SHARED_DEPS_INCLUDE_PATHS="$GITHUB_WORKSPACE/SharedDependencies/Sources/vulkan:$GITHUB_WORKSPACE/SharedDependencies/Sources/vk_video:$GITHUB_WORKSPACE/SharedDependencies/Sources/MoltenVK:$GITHUB_WORKSPACE/SharedDependencies/Sources/boost/include"
          echo "CPATH=${SHARED_DEPS_INCLUDE_PATHS}:${CPATH:-}" >> "${GITHUB_ENV}"
          echo "CPLUS_INCLUDE_PATH=${SHARED_DEPS_INCLUDE_PATHS}:${CPLUS_INCLUDE_PATH:-}" >> "${GITHUB_ENV}"

      - name: Fetch third-party headers (Boost)
        run: |
          ./scripts/fetch_third_party_headers.sh

      - name: Generate Xcode project
        run: |
          cd ios
          xcodegen generate --spec project.yml

      - name: Install pods
        run: |
          cd ios
          pod install --project-directory=.

      - name: Reset SwiftPM artifact cache
        run: |
          rm -rf "${HOME}/Library/Caches/org.swift.swiftpm/artifacts"
          rm -rf "${HOME}/Library/Caches/org.swift.swiftpm/repositories"

      - name: Resolve Swift packages
        run: |
          cd ios
          xcodebuild -resolvePackageDependencies \
            -workspace AuroraSwift.xcworkspace \
            -scheme Cytrus

      - name: Build for iOS device (arm64)
        run: |
          cd ios
          xcodebuild \
            -workspace AuroraSwift.xcworkspace \
            -scheme Cytrus \
            -configuration Release \
            -sdk iphoneos \
            -destination 'generic/platform=iOS' \
            build CODE_SIGNING_ALLOWED=NO

name: Linux Build

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  build-linux:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential pkg-config libsdl2-dev xvfb

      - name: Build Linux binary
        run: |
          make clean
          make -j"$(nproc)" AURORA_LINUX_3DS_ONLY=1
          test -x build/nanoboyadvance-linux

      - name: Aurora3DS Linux load smoke test
        run: |
          curl -L https://github.com/16BitWonder/3DS-TEST/releases/download/v1.0/3DS-TEST.cia -o /tmp/3DS-TEST.cia
          xvfb-run -a ./build/nanoboyadvance-linux /tmp/3DS-TEST.cia > /tmp/aurora3ds-linux.log 2>&1 || true
          grep -Eq "failed to load libaurora3ds_bridge.so|EmulatorCore_LoadROMFromPath failed" /tmp/aurora3ds-linux.log

      - name: Upload Linux binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: nanoboyadvance-linux
          path: build/nanoboyadvance-linux

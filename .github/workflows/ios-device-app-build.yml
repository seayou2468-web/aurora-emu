name: iOS Device App Build

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  build-ios-app:
    runs-on: macos-15
    env:
      DEVELOPER_DIR: /Applications/Xcode_26.1.1.app/Contents/Developer
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode 26.1.1 if available
        shell: bash
        run: |
          if [ -d "/Applications/Xcode_26.1.1.app" ]; then
            sudo xcode-select -s /Applications/Xcode_26.1.1.app/Contents/Developer
          fi
          xcodebuild -version

      - name: Install XcodeGen
        shell: bash
        run: |
          brew update
          brew install xcodegen
          xcodegen --version

      - name: Install Aurora3DS build prerequisites
        shell: bash
        run: |
          brew install zstd
          zstd --version
          BOOST_VERSION="1.87.0"
          BOOST_UNDERSCORE="${BOOST_VERSION//./_}"
          BOOST_TARBALL="boost_${BOOST_UNDERSCORE}.tar.gz"
          curl -fsSL "https://archives.boost.io/release/${BOOST_VERSION}/source/${BOOST_TARBALL}" -o "/tmp/${BOOST_TARBALL}"
          tar -xzf "/tmp/${BOOST_TARBALL}" -C /tmp
          mkdir -p src/core/aurora3ds/Core/include
          rsync -a --delete "/tmp/boost_${BOOST_UNDERSCORE}/boost/" src/core/aurora3ds/Core/include/boost/
          test -f src/core/aurora3ds/Core/include/boost/optional.hpp

      - name: Generate Xcode project
        shell: bash
        run: |
          xcodegen generate --spec ios/project.yml --project ios

      - name: Verify Aurora3DS is permanently in build graph
        shell: bash
        run: |
          rg -n "path: ../src/core/aurora3ds/core_adapter.cpp" ios/project.yml
          rg -n "path: ../src/core/aurora3ds/bridge.cpp" ios/project.yml
          rg -n "path: ../src/core/aurora3ds/Core" ios/project.yml
          rg -n "path: ../src/core/aurora3ds/CitraObjC" ios/project.yml
          rg -n "\\$\\(BUILD_DIR\\)/src/core/aurora3ds/bridge\\.o" Makefile

      - name: Verify iOS device-only build target
        shell: bash
        run: |
          rg -n "SDKROOT: iphoneos" ios/project.yml
          rg -n "SUPPORTED_PLATFORMS: iphoneos" ios/project.yml
          rg -n "\\-sdk iphoneos" .github/workflows/ios-device-app-build.yml
          rg -n "generic/platform=iOS" .github/workflows/ios-device-app-build.yml

      - name: Build iOS app archive (.app inside .xcarchive)
        shell: bash
        run: |
          mkdir -p build
          xcodebuild \
            -project ios/AuroraIOS.xcodeproj \
            -scheme AuroraIOS \
            -configuration Release \
            -sdk iphoneos \
            -destination "generic/platform=iOS" \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            AURORA_DISABLE_JIT=1 \
            GCC_PREPROCESSOR_DEFINITIONS='$(inherited) AURORA_IOS_MINIMAL_CORE=1 AURORA_DISABLE_JIT=1' \
            archive \
            -archivePath build/AuroraIOS.xcarchive

      - name: Package .app artifact
        shell: bash
        run: |
          APP_PATH="build/AuroraIOS.xcarchive/Products/Applications/AuroraIOS.app"
          test -d "$APP_PATH"
          ditto -c -k --sequesterRsrc --keepParent "$APP_PATH" build/AuroraIOS.app.zip

      - name: Upload app artifact
        uses: actions/upload-artifact@v4
        with:
          name: AuroraIOS-app-iphoneos
          path: build/AuroraIOS.app.zip

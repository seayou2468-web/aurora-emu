name: iOS Device App Build

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  build-ios-app:
    runs-on: macos-15
    env:
      DEVELOPER_DIR: /Applications/Xcode_26.1.1.app/Contents/Developer
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode 26.1.1 if available
        shell: bash
        run: |
          if [ -d "/Applications/Xcode_26.1.1.app" ]; then
            sudo xcode-select -s /Applications/Xcode_26.1.1.app/Contents/Developer
          fi
          xcodebuild -version

      - name: Install XcodeGen
        shell: bash
        run: |
          brew update
          brew install xcodegen
          xcodegen --version

      - name: Install Aurora3DS build prerequisites
        shell: bash
        run: |
          brew install cocoapods
          pod --version

      - name: Install Vulkan SDK headers and configure include path
        shell: bash
        run: |
          brew install vulkan-headers
          VULKAN_HEADERS_PREFIX="$(brew --prefix vulkan-headers)"
          test -d "${VULKAN_HEADERS_PREFIX}/include/vulkan"
          test -f "${VULKAN_HEADERS_PREFIX}/include/vulkan/vulkan.hpp"
          echo "CPATH=${VULKAN_HEADERS_PREFIX}/include:${CPATH}" >> "$GITHUB_ENV"
          echo "CPLUS_INCLUDE_PATH=${VULKAN_HEADERS_PREFIX}/include:${CPLUS_INCLUDE_PATH}" >> "$GITHUB_ENV"

      - name: Generate Xcode project
        shell: bash
        run: |
          xcodegen generate --spec ios/project.yml --project ios

      - name: Install CocoaPods dependencies (Boost & zstd)
        shell: bash
        run: |
          pod install --project-directory=ios --repo-update
          test -d ios/Pods/boost
          test -d ios/Pods/libzstd
          test -f ios/Pods/Pods.xcodeproj/project.pbxproj

      - name: Build CocoaPods dependencies for iOS device
        shell: bash
        run: |
          xcodebuild \
            -project ios/Pods/Pods.xcodeproj \
            -scheme boost \
            -configuration Release \
            -sdk iphoneos \
            -destination "generic/platform=iOS" \
            CLANG_CXX_LANGUAGE_STANDARD=gnu++20 \
            CLANG_CXX_LIBRARY=libc++ \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            build
          xcodebuild \
            -project ios/Pods/Pods.xcodeproj \
            -scheme libzstd \
            -configuration Release \
            -sdk iphoneos \
            -destination "generic/platform=iOS" \
            CLANG_CXX_LANGUAGE_STANDARD=gnu++20 \
            CLANG_CXX_LIBRARY=libc++ \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            build

      - name: Stage Aurora3DS third-party headers for in-tree core build
        shell: bash
        run: |
          BOOST_VERSION="1.87.0"
          BOOST_UNDERSCORE="${BOOST_VERSION//./_}"
          BOOST_TARBALL="boost_${BOOST_UNDERSCORE}.tar.gz"
          curl -fsSL "https://archives.boost.io/release/${BOOST_VERSION}/source/${BOOST_TARBALL}" -o "/tmp/${BOOST_TARBALL}"
          tar -xzf "/tmp/${BOOST_TARBALL}" -C /tmp
          mkdir -p src/core/aurora3ds/Core/include
          rsync -a --delete "/tmp/boost_${BOOST_UNDERSCORE}/boost/" src/core/aurora3ds/Core/include/boost/
          test -f src/core/aurora3ds/Core/include/boost/optional.hpp
          test -f src/core/aurora3ds/Core/include/boost/align/align.hpp

          ZSTD_HEADER_PATH="$(find ios/Pods/libzstd -type f -name 'zstd.h' | head -n 1)"
          test -n "$ZSTD_HEADER_PATH"
          ZSTD_HEADER_DIR="$(dirname "$ZSTD_HEADER_PATH")"
          rsync -a "$ZSTD_HEADER_DIR/" src/core/aurora3ds/Core/include/
          test -f src/core/aurora3ds/Core/include/zstd.h
          test -f src/core/aurora3ds/Core/include/zdict.h
          test -f src/core/aurora3ds/Core/include/zstd_errors.h

          VMA_VERSION="v3.2.1"
          curl -fsSL "https://raw.githubusercontent.com/GPUOpen-LibrariesAndSDKs/VulkanMemoryAllocator/${VMA_VERSION}/include/vk_mem_alloc.h" \
            -o src/core/aurora3ds/Core/include/vk_mem_alloc.h
          test -f src/core/aurora3ds/Core/include/vk_mem_alloc.h

          # Patch known Boost documentation warnings emitted by clang -Wdocumentation.
          perl -0pi -e 's/\\param Range An input range/\\param r An input range/g' \
            src/core/aurora3ds/Core/include/boost/range/iterator_range_core.hpp
          perl -0pi -e 's{//<-- but this\\.}{// <-- but this.}g' \
            src/core/aurora3ds/Core/include/boost/icl/functors.hpp

      - name: Verify Aurora3DS is permanently in build graph
        shell: bash
        run: |
          grep -nF "path: ../src/core/aurora3ds/core_adapter.cpp" ios/project.yml
          grep -nF "path: ../src/core/aurora3ds/bridge.cpp" ios/project.yml
          grep -nF "path: ../src/core/aurora3ds/Core" ios/project.yml
          grep -nF "path: ../src/core/aurora3ds/CitraObjC" ios/project.yml
          grep -nF "\$(BUILD_DIR)/src/core/aurora3ds/bridge.o" Makefile
          grep -nF "pod 'boost'" ios/Podfile
          grep -nF "pod 'libzstd'" ios/Podfile
          test -f src/core/aurora3ds/Core/include/vk_mem_alloc.h

      - name: Verify iOS device-only build target
        shell: bash
        run: |
          grep -nF "SDKROOT: iphoneos" ios/project.yml
          grep -nF "SUPPORTED_PLATFORMS: iphoneos" ios/project.yml
          grep -nF -- "-sdk iphoneos" .github/workflows/ios-device-app-build.yml
          grep -nF "generic/platform=iOS" .github/workflows/ios-device-app-build.yml
          grep -nF "vulkan-headers" .github/workflows/ios-device-app-build.yml

      - name: Build iOS app archive (.app inside .xcarchive)
        shell: bash
        run: |
          mkdir -p build
          xcodebuild \
            -workspace ios/AuroraIOS.xcworkspace \
            -scheme AuroraIOS \
            -configuration Release \
            -sdk iphoneos \
            -destination "generic/platform=iOS" \
            CLANG_CXX_LANGUAGE_STANDARD=gnu++20 \
            CLANG_CXX_LIBRARY=libc++ \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            AURORA_DISABLE_JIT=1 \
            GCC_PREPROCESSOR_DEFINITIONS='$(inherited) AURORA_IOS_MINIMAL_CORE=1 AURORA_DISABLE_JIT=1' \
            archive \
            -archivePath build/AuroraIOS.xcarchive

      - name: Package .app artifact
        shell: bash
        run: |
          APP_PATH="build/AuroraIOS.xcarchive/Products/Applications/AuroraIOS.app"
          test -d "$APP_PATH"
          ditto -c -k --sequesterRsrc --keepParent "$APP_PATH" build/AuroraIOS.app.zip

      - name: Upload app artifact
        uses: actions/upload-artifact@v4
        with:
          name: AuroraIOS-app-iphoneos
          path: build/AuroraIOS.app.zip

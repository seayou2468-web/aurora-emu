name: AuroraIOS
options:
  minimumXcodeGenVersion: 2.38.0
  deploymentTarget:
    iOS: '26.0'
configs:
  Debug: debug
  Release: release
settings:
  base:
    PRODUCT_BUNDLE_IDENTIFIER: com.frappev.rn
    SWIFT_VERSION: 6.3
    INFOPLIST_FILE: Config/Info.plist
    CODE_SIGN_STYLE: Automatic
    CLANG_CXX_LANGUAGE_STANDARD: gnu++20
    HEADER_SEARCH_PATHS:
      - $(SRCROOT)
      - $(SRCROOT)/Platforms/API
      - $(SRCROOT)/src
    SWIFT_OBJC_BRIDGING_HEADER: Platforms/AuroraIOS/swift/Bridge/AuroraSwift-Bridging-Header.h
    OTHER_LDFLAGS:
      - -ObjC
      - -lc++
      - -lz
      - -liconv

packages: {}

targets:
  AuroraIOS:
    type: application
    platform: iOS
    deploymentTarget: '26.0'
    sources:
      - path: Platforms/AuroraIOS/swift
      - path: Platforms/API
      - path: src/core/api
      - path: src/core/module_cores
        excludes:
          - '**/CMakeLists.txt'
          - '**/*.md'
          - '**/*.txt'
          - '**/*.inc'
          - '**/*.inl'
          - '**/*.yml'
          - '**/.*'
          - '**/*.plist'
    settings:
      base:
        PRODUCT_NAME: AuroraIOS
        TARGETED_DEVICE_FAMILY: '1,2'
        ENABLE_BITCODE: NO
    info:
      path: Config/Info.plist
    entitlements:
      path: Config/Entitlements.plist

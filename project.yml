name: AuroraIOS
options:
  minimumXcodeGenVersion: 2.38.0
configs:
  Debug: debug
  Release: release
settings:
  base:
    PRODUCT_BUNDLE_IDENTIFIER: com.frappev.rn
    SWIFT_VERSION: 6.3
    INFOPLIST_FILE: Config/Info.plist
    CODE_SIGN_STYLE: Automatic
    CLANG_CXX_LANGUAGE_STANDARD: gnu++20
    HEADER_SEARCH_PATHS:
      - $(SRCROOT)
      - $(SRCROOT)/Platforms/API
      - $(SRCROOT)/src
      - $(SRCROOT)/src/core/api
      - $(SRCROOT)/src/core/module_cores
    SWIFT_OBJC_BRIDGING_HEADER: Platforms/AuroraIOS/swift/Bridge/AuroraSwift-Bridging-Header.h
    OTHER_LDFLAGS:
      - -lc++
      - -lz
      - -liconv

targets:
  AuroraIOS:
    type: application
    platform: iOS
    deploymentTarget: '26.0'
    sources:
      - path: Platforms/AuroraIOS/swift
      - path: Platforms/API
      - path: src/core/api/emulator_core_c_api.cpp
      - path: src/core/module_cores/core_adapter_registry.cpp
      - path: src/core/module_cores/nanoboyadvance
        recursive: true
        excludes:
          - core_adapter.cpp
          - runtime.cpp
          - '**/CMakeLists.txt'
          - '**/*.md'
          - '**/*.txt'
          - '**/*.yml'
          - '**/.*'
      - path: src/core/module_cores/quick_nes
        recursive: true
        excludes:
          - core_adapter.cpp
          - runtime.cpp
          - '**/CMakeLists.txt'
          - '**/*.md'
          - '**/*.txt'
          - '**/*.yml'
          - '**/.*'
      - path: src/core/module_cores/sameboy
        recursive: true
        excludes:
          - core_adapter.cpp
          - runtime.cpp
          - c_api.c
          - '**/CMakeLists.txt'
          - '**/*.md'
          - '**/*.txt'
          - '**/*.yml'
          - '**/.*'
      - path: src/core/module_cores/melonds
        recursive: true
        excludes:
          - core_adapter.cpp
          - runtime.cpp
          - '**/CMakeLists.txt'
          - '**/*.md'
          - '**/*.txt'
          - '**/*.yml'
          - '**/.*'
          - teakra/tests
      - path: src/core
        recursive: true
        excludes:
          - bridge_cores
          - api
          - module_cores
          - '**/CMakeLists.txt'
          - '**/*.md'
          - '**/*.txt'
          - '**/*.inc'
          - '**/*.inl'
          - '**/*.yml'
          - '**/.*'
          - '**/*.plist'
      - path: src/core/module_cores/nanoboyadvance/core_adapter.cpp
      - path: src/core/module_cores/quick_nes/core_adapter.cpp
      - path: src/core/module_cores/sameboy/core_adapter.cpp
      - path: src/core/module_cores/melonds/core_adapter.cpp
      - path: src/core/module_cores/nanoboyadvance/runtime.cpp
      - path: src/core/module_cores/quick_nes/runtime.cpp
      - path: src/core/module_cores/sameboy/runtime.cpp
      - path: src/core/module_cores/sameboy/c_api.c
      - path: src/core/module_cores/melonds/runtime.cpp
    settings:
      base:
        PRODUCT_NAME: AuroraIOS
        TARGETED_DEVICE_FAMILY: '1,2'
        ENABLE_BITCODE: NO
    info:
      path: Config/Info.plist
    entitlements:
      path: Config/Entitlements.plist

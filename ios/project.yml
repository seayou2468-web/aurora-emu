name: AuroraSwift
options:
  deploymentTarget:
    iOS: "26.0"
configs:
  Debug: debug
  Release: release
schemes:
  Cytrus:
    build:
      targets:
        AuroraSwift: all
    run:
      config: Release
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release
packages:
  zlib-spm:
    url: https://github.com/Azoy/zlib-spm
    branch: master
  zstd:
    url: https://github.com/jarrodnorwell/zstd
    branch: dev
  openssl:
    url: https://github.com/krzyzanowskim/OpenSSL
    branch: main
  SharedDependencies:
    path: ../SharedDependencies
settings:
  base:
    PRODUCT_BUNDLE_IDENTIFIER: com.auroraemu.auroraswift
    SWIFT_VERSION: 5.10
    SWIFT_OBJC_BRIDGING_HEADER: ../Platforms/AuroraIOS/swift/Bridge/AuroraSwift-Bridging-Header.h
    CLANG_CXX_LANGUAGE_STANDARD: gnu++20
    OTHER_CPLUSPLUSFLAGS:
      - "$(inherited)"
      - "-std=gnu++20"
    ENABLE_BITCODE: NO
    GCC_PREPROCESSOR_DEFINITIONS:
      - "$(inherited)"
      - "CPPHTTPLIB_OPENSSL_SUPPORT"
      - "HAVE_OPENAL"
      - "HAVE_SDL3"
      - "HAVE_COREAUDIO"
      - "ENABLE_SDL3"
      - "ENABLE_VULKAN"
      - "ENABLE_WEB_SERVICE"
      - "ENABLE_SOFTWARE_RENDERER=1"
    HEADER_SEARCH_PATHS:
      - "$(inherited)"
      - "$(SRCROOT)/../src"
      - "$(SRCROOT)/../src/core"
      - "$(SRCROOT)/../src/core/bridge_cores/aurora3ds"
      - "$(SRCROOT)/../src/core/bridge_cores/aurora3ds/Core/include"
      - "$(SRCROOT)/../SharedDependencies/Sources/cereal/include"
      - "$(SRCROOT)/../SharedDependencies/Sources/cryptopp/include"
      - "$(SRCROOT)/../SharedDependencies/Sources/dds_ktx/include"
      - "$(SRCROOT)/../SharedDependencies/Sources/eventbus/include"
      - "$(SRCROOT)/../SharedDependencies/Sources/glslang/include"
      - "$(SRCROOT)/../SharedDependencies/Sources/glib/include"
      - "$(SRCROOT)/../SharedDependencies/Sources/httplib/include"
      - "$(SRCROOT)/../SharedDependencies/Sources/inih/include"
      - "$(SRCROOT)/../SharedDependencies/Sources/jwt/include"
      - "$(SRCROOT)/../SharedDependencies/Sources/libslirp/include"
      - "$(SRCROOT)/../SharedDependencies/Sources/lodepng/include"
      - "$(SRCROOT)/../SharedDependencies/Sources/magic_enum/include"
      - "$(SRCROOT)/../SharedDependencies/Sources/metal_cpp/include"
      - "$(SRCROOT)/../SharedDependencies/Sources/microprofile/include"
      - "$(SRCROOT)/../SharedDependencies/Sources/miniz/include"
      - "$(SRCROOT)/../SharedDependencies/Sources/nihstro/include"
      - "$(SRCROOT)/../SharedDependencies/Sources/nlohmann/include"
      - "$(SRCROOT)/../SharedDependencies/Sources/oaknut/include"
      - "$(SRCROOT)/../SharedDependencies/Sources/boost/include"
      - "$(SRCROOT)/../SharedDependencies/Sources/vma/include"
      - "$(SRCROOT)/../SharedDependencies/Sources/stb/include"
      - "$(SRCROOT)/../SharedDependencies/Sources/toml/include"
      - "$(SRCROOT)/../SharedDependencies/Sources/tsl/include"
      - "$(SRCROOT)/../SharedDependencies/Sources/xxhash/include"
      - "$(SRCROOT)/../SharedDependencies/Sources/vulkan/include"
      - "$(SRCROOT)/../SharedDependencies/Sources/vk_video"
      - "$(SRCROOT)/../SharedDependencies/Sources/MoltenVK"
      - "$(SRCROOT)/../Platforms/API"
      - "$(SRCROOT)/../Platforms/AuroraIOS/objc"
    FRAMEWORK_SEARCH_PATHS:
      - "$(SRCROOT)/../SharedDependencies"
      - "$(inherited)"
    LIBRARY_SEARCH_PATHS:
      - "$(SRCROOT)/../SharedDependencies"
      - "$(inherited)"

targets:
  AuroraSwift:
    type: application
    platform: iOS
    info:
      path: ../Config/Info.plist
    entitlements:
      path: ../Config/Entitlements.plist
    sources:
      - path: ../Platforms/AuroraIOS/swift
      - path: ../Platforms/AuroraIOS/objc/Controllers/AUR3DSEmulatorViewController.h
      - path: ../Platforms/AuroraIOS/objc/Controllers/AUR3DSEmulatorViewController.mm
      - path: ../src/core/bridge_cores/aurora3ds
        excludes:
          - "**/*.md"
          - "**/*.txt"
    dependencies:
      - package: SharedDependencies
        product: SharedDependencies
      - package: zstd
        product: libzstd
      - package: zstd
        product: libseekable_format
      - package: openssl
        product: OpenSSL
      - framework: ../SharedDependencies/MoltenVK.xcframework
      - framework: ../SharedDependencies/libavcodec.xcframework
      - framework: ../SharedDependencies/libavfilter.xcframework
      - framework: ../SharedDependencies/libavformat.xcframework
      - framework: ../SharedDependencies/libavutil.xcframework
      - framework: ../SharedDependencies/libswresample.xcframework
      - framework: ../SharedDependencies/libswscale.xcframework
    settings:
      base:
        INFOPLIST_FILE: ../Config/Info.plist
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: ""

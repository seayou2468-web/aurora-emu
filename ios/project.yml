name: AuroraSwift
options:
  deploymentTarget:
    iOS: "26.0"
configs:
  Debug: debug
  Release: release
schemes:
  Cytrus:
    build:
      targets:
        AuroraSwift: all
    run:
      config: Release
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release
packages:
  zlib-spm:
    url: https://github.com/Azoy/zlib-spm
    branch: master
  zstd:
    url: https://github.com/jarrodnorwell/zstd
    branch: dev
settings:
  base:
    PRODUCT_BUNDLE_IDENTIFIER: com.auroraemu.auroraswift
    SWIFT_VERSION: 5.10
    SWIFT_OBJC_BRIDGING_HEADER: ../Platforms/AuroraIOS/swift/Bridge/AuroraSwift-Bridging-Header.h
    CLANG_CXX_LANGUAGE_STANDARD: gnu++20
    OTHER_CPLUSPLUSFLAGS:
      - "$(inherited)"
      - "-std=gnu++20"
    ENABLE_BITCODE: NO
    GCC_PREPROCESSOR_DEFINITIONS:
      - "$(inherited)"
      - "ENABLE_VULKAN=1"
      - "ENABLE_SOFTWARE_RENDERER=1"
    HEADER_SEARCH_PATHS:
      - "$(inherited)"
      - "$(SRCROOT)/../src"
      - "$(SRCROOT)/../src/core"
      - "$(SRCROOT)/../src/core/bridge_cores/aurora3ds"
      - "$(SRCROOT)/../src/core/bridge_cores/aurora3ds/Core/include"
      - "$(SRCROOT)/../Dependicies/Sources/cereal/include"
      - "$(SRCROOT)/../Dependicies/Sources/cryptopp/include"
      - "$(SRCROOT)/../Dependicies/Sources/dds_ktx/include"
      - "$(SRCROOT)/../Dependicies/Sources/eventbus/include"
      - "$(SRCROOT)/../Dependicies/Sources/glib/include"
      - "$(SRCROOT)/../Dependicies/Sources/httplib/include"
      - "$(SRCROOT)/../Dependicies/Sources/inih/include"
      - "$(SRCROOT)/../Dependicies/Sources/jwt/include"
      - "$(SRCROOT)/../Dependicies/Sources/libchdr/include"
      - "$(SRCROOT)/../Dependicies/Sources/libslirp/include"
      - "$(SRCROOT)/../Dependicies/Sources/lodepng/include"
      - "$(SRCROOT)/../Dependicies/Sources/magic_enum/include"
      - "$(SRCROOT)/../Dependicies/Sources/metal_cpp/include"
      - "$(SRCROOT)/../Dependicies/Sources/microprofile/include"
      - "$(SRCROOT)/../Dependicies/Sources/miniz/include"
      - "$(SRCROOT)/../Dependicies/Sources/nihstro/include"
      - "$(SRCROOT)/../Dependicies/Sources/nlohmann/include"
      - "$(SRCROOT)/../Dependicies/Sources/oaknut/include"
      - "$(SRCROOT)/../Dependicies/Sources/boost/include"
      - "$(SRCROOT)/../Dependicies/Sources/vma/include"
      - "$(SRCROOT)/../Dependicies/Sources/stb/include"
      - "$(SRCROOT)/../Dependicies/Sources/toml/include"
      - "$(SRCROOT)/../Dependicies/Sources/tsl/include"
      - "$(SRCROOT)/../Dependicies/Sources/xxhash/include"
      - "$(SRCROOT)/../Dependicies/Sources/vulkan/include"
      - "$(SRCROOT)/../Platforms/API"
      - "$(SRCROOT)/../Platforms/AuroraIOS/objc"
    FRAMEWORK_SEARCH_PATHS:
      - "$(SRCROOT)/../Dependicies"
      - "$(inherited)"
    LIBRARY_SEARCH_PATHS:
      - "$(SRCROOT)/../Dependicies"
      - "$(inherited)"

targets:
  AuroraSwift:
    type: application
    platform: iOS
    info:
      path: ../Config/Info.plist
    entitlements:
      path: ../Config/Entitlements.plist
    sources:
      - path: ../Platforms/AuroraIOS/swift
      - path: ../Platforms/AuroraIOS/objc/Controllers/AUR3DSEmulatorViewController.h
      - path: ../Platforms/AuroraIOS/objc/Controllers/AUR3DSEmulatorViewController.mm
      - path: ../src/core/bridge_cores/aurora3ds
        excludes:
          - "**/*.md"
          - "**/*.txt"
    dependencies:
      - framework: ../Dependicies/FLAC.xcframework
      - framework: ../Dependicies/MoltenVK.xcframework
      - framework: ../Dependicies/SDL3.xcframework
      - framework: ../Dependicies/libavcodec.xcframework
      - framework: ../Dependicies/libavfilter.xcframework
      - framework: ../Dependicies/libavformat.xcframework
      - framework: ../Dependicies/libavutil.xcframework
      - framework: ../Dependicies/libboostcontext.xcframework
      - framework: ../Dependicies/libboostiostreams.xcframework
      - framework: ../Dependicies/libboostprogramoptions.xcframework
      - framework: ../Dependicies/libboostserialization.xcframework
      - framework: ../Dependicies/libdynarmic.xcframework
      - framework: ../Dependicies/libenet.xcframework
      - framework: ../Dependicies/libfaad2.xcframework
      - framework: ../Dependicies/libfmt.xcframework
      - framework: ../Dependicies/libgenericcodegen.xcframework
      - framework: ../Dependicies/libglslang.xcframework
      - framework: ../Dependicies/libmachineindependent.xcframework
      - framework: ../Dependicies/libmcl.xcframework
      - framework: ../Dependicies/libopenal.xcframework
      - framework: ../Dependicies/libopus.xcframework
      - framework: ../Dependicies/libsirit.xcframework
      - framework: ../Dependicies/libsoundtouch.xcframework
      - framework: ../Dependicies/libswresample.xcframework
      - framework: ../Dependicies/libswscale.xcframework
      - framework: ../Dependicies/libteakra.xcframework
      - framework: ../Dependicies/ogg.xcframework
      - package: zstd
        product: libzstd
      - package: zstd
        product: libseekable_format
    settings:
      base:
        INFOPLIST_FILE: ../Config/Info.plist
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: ""
